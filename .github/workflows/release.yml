name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            archive: sonicforge-cli-windows-x64.zip
          - platform: ubuntu-x64
            os: ubuntu-latest
            archive: sonicforge-cli-linux-x64.tar.gz
          - platform: macos-x64
            os: macos-15-intel
            archive: sonicforge-cli-macos-x64.tar.gz

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release workspace
        run: cargo build --release --workspace

      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Compress-Archive -LiteralPath target/release/sonicforge-cli.exe -DestinationPath "dist/${{ matrix.archive }}"

      - name: Package Unix CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/${{ matrix.archive }}" sonicforge-cli

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: sonicforge-${{ matrix.platform }}-${{ github.sha }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  desktop-windows:
    name: Build desktop GUI windows-x64
    runs-on: windows-latest
    environment: release-signing
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: apps/desktop/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Import optional Windows signing certificate
        id: signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Output "Signing secrets are incomplete; building an unsigned installer."
            exit 0
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "sonicforge-signing.pfx"
          $encodedCertificate = $env:WINDOWS_CERTIFICATE -replace '\s', ''
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($encodedCertificate)
          )

          $securePassword = ConvertTo-SecureString `
            -String $env:WINDOWS_CERTIFICATE_PASSWORD `
            -AsPlainText `
            -Force
          $certificates = Import-PfxCertificate `
            -FilePath $certificatePath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $securePassword
          $signingCertificate = @($certificates) |
            Where-Object { $_.HasPrivateKey } |
            Select-Object -First 1

          if ($null -eq $signingCertificate) {
            throw "The imported PFX does not contain a certificate with a private key."
          }

          Write-Output "::add-mask::$($signingCertificate.Thumbprint)"
          "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thumbprint=$($signingCertificate.Thumbprint)" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build Tauri NSIS installer
        working-directory: apps/desktop
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ steps.signing.outputs.thumbprint }}
        run: |
          $tauriArguments = @("tauri", "build", "--bundles", "nsis")

          if ("${{ steps.signing.outputs.enabled }}" -eq "true") {
            $signingConfig = @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                  digestAlgorithm = "sha256"
                  timestampUrl = "http://timestamp.digicert.com"
                }
              }
            } | ConvertTo-Json -Depth 4 -Compress
            $tauriArguments += @("--config", $signingConfig)
          }

          & cargo @tauriArguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v7
        with:
          name: sonicforge-studio-windows-nsis-${{ github.sha }}
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, desktop-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sonicforge-*-${{ github.sha }}
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        shell: bash
        run: sha256sum * > SHA256SUMS

      - name: Create or update tag release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          installers=(release-assets/*.exe)
          if [[ ${#installers[@]} -ne 1 ]]; then
            echo "Expected exactly one NSIS installer, found ${#installers[@]}." >&2
            exit 1
          fi

          assets=(release-assets/*)

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "SonicForge Studio $GITHUB_REF_NAME"
          fi
