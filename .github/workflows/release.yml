name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  WINDOWS_TIMESTAMP_URL: http://timestamp.digicert.com

jobs:
  build:
    name: Build ${{ matrix.platform }}
    if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    environment: release-signing
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            os: windows-latest
            archive: sonicforge-cli-windows-x64.zip
          - platform: ubuntu-x64
            os: ubuntu-latest
            archive: sonicforge-cli-linux-x64.tar.gz
          - platform: macos-x64
            os: macos-15-intel
            archive: sonicforge-cli-macos-x64.tar.gz

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Require Windows signing secrets
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
            throw 'release-signing Environment must provide WINDOWS_SIGNING_PFX_BASE64 and WINDOWS_SIGNING_PFX_PASSWORD.'
          }

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release workspace
        run: cargo build --release --workspace

      - name: Sign Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'sonicforge-release-signing.pfx'
          $encodedCertificate = $env:WINDOWS_SIGNING_PFX_BASE64 -replace '\s', ''
          try {
            $certificateBytes = [Convert]::FromBase64String($encodedCertificate)
          } catch {
            throw 'WINDOWS_SIGNING_PFX_BASE64 is not valid base64.'
          }
          if ($certificateBytes.Length -eq 0) {
            throw 'WINDOWS_SIGNING_PFX_BASE64 decoded to an empty file.'
          }
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)

          $password = ConvertTo-SecureString `
            -String $env:WINDOWS_SIGNING_PFX_PASSWORD `
            -AsPlainText `
            -Force
          $signingScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/sign-windows.ps1'
          & $signingScript `
            -PfxPath $certificatePath `
            -PfxPassword $password `
            -TimestampUrl $env:WINDOWS_TIMESTAMP_URL `
            -Path (Join-Path $env:GITHUB_WORKSPACE 'target/release/sonicforge-cli.exe')
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Compress-Archive -LiteralPath target/release/sonicforge-cli.exe -DestinationPath "dist/${{ matrix.archive }}"

      - name: Package Unix CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          tar -C target/release -czf "dist/${{ matrix.archive }}" sonicforge-cli

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: sonicforge-${{ matrix.platform }}-${{ github.sha }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

      - name: Remove Windows signing material
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'sonicforge-release-signing.pfx'
          if (Test-Path -LiteralPath $certificatePath -PathType Leaf) {
            Remove-Item -LiteralPath $certificatePath -Force
          }

  desktop-windows:
    name: Build desktop GUI windows-x64
    if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: windows-latest
    environment: release-signing
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Require Windows signing secrets
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_BASE64) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_PFX_PASSWORD)) {
            throw 'release-signing Environment must provide WINDOWS_SIGNING_PFX_BASE64 and WINDOWS_SIGNING_PFX_PASSWORD.'
          }

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          package_json_file: apps/desktop/package.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.11.4 --locked

      - name: Import Windows signing certificate
        id: signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP 'sonicforge-release-signing.pfx'
          $statePath = Join-Path $env:RUNNER_TEMP 'sonicforge-signing-state.json'
          $encodedCertificate = $env:WINDOWS_SIGNING_PFX_BASE64 -replace '\s', ''
          try {
            $certificateBytes = [Convert]::FromBase64String($encodedCertificate)
          } catch {
            throw 'WINDOWS_SIGNING_PFX_BASE64 is not valid base64.'
          }
          if ($certificateBytes.Length -eq 0) {
            throw 'WINDOWS_SIGNING_PFX_BASE64 decoded to an empty file.'
          }
          [IO.File]::WriteAllBytes($certificatePath, $certificateBytes)

          $password = ConvertTo-SecureString `
            -String $env:WINDOWS_SIGNING_PFX_PASSWORD `
            -AsPlainText `
            -Force
          $signingScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/sign-windows.ps1'
          & $signingScript `
            -PfxPath $certificatePath `
            -PfxPassword $password `
            -TimestampUrl $env:WINDOWS_TIMESTAMP_URL `
            -ImportOnly `
            -StatePath $statePath `
            -GitHubOutputPath $env:GITHUB_OUTPUT
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build Tauri NSIS installer
        working-directory: apps/desktop
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ steps.signing.outputs.thumbprint }}
          WINDOWS_TIMESTAMP_URL: ${{ env.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_THUMBPRINT)) {
            throw 'The signing step did not produce a certificate thumbprint.'
          }
          $tauriArguments = @("tauri", "build", "--bundles", "nsis")

          $signingConfig = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                digestAlgorithm = "sha256"
                timestampUrl = $env:WINDOWS_TIMESTAMP_URL
                tsp = $true
              }
            }
          } | ConvertTo-Json -Depth 5 -Compress
          $tauriArguments += @("--config", $signingConfig)

          & cargo @tauriArguments
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Verify Windows Authenticode signatures
        working-directory: apps/desktop
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ steps.signing.outputs.thumbprint }}
          WINDOWS_TIMESTAMP_URL: ${{ env.WINDOWS_TIMESTAMP_URL }}
        run: |
          $files = @()
          $files += @(Get-ChildItem -LiteralPath 'src-tauri/target/release' -Filter '*.exe' -File)
          $files += @(Get-ChildItem -LiteralPath 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File)
          $files = @($files | Sort-Object -Property FullName -Unique)
          if ($files.Count -eq 0) {
            throw 'No Windows executable was produced for signature verification.'
          }

          $filePaths = @($files | Select-Object -ExpandProperty FullName)
          $signingScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/sign-windows.ps1'
          & $signingScript `
            -VerifyOnly `
            -CertificateThumbprint $env:WINDOWS_CERTIFICATE_THUMBPRINT `
            -TimestampUrl $env:WINDOWS_TIMESTAMP_URL `
            -Path $filePaths
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v7
        with:
          name: sonicforge-studio-windows-nsis-${{ github.sha }}
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Remove Windows signing material
        if: always()
        shell: pwsh
        run: |
          $statePath = Join-Path $env:RUNNER_TEMP 'sonicforge-signing-state.json'
          $signingScript = Join-Path $env:GITHUB_WORKSPACE 'scripts/sign-windows.ps1'
          if (Test-Path -LiteralPath $statePath -PathType Leaf) {
            & $signingScript -Cleanup -StatePath $statePath
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP 'sonicforge-release-signing.pfx'
          if (Test-Path -LiteralPath $certificatePath -PathType Leaf) {
            Remove-Item -LiteralPath $certificatePath -Force
          }

  github-release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    needs: [build, desktop-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Download all release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: sonicforge-*-${{ github.sha }}
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        shell: bash
        run: sha256sum * > SHA256SUMS

      - name: Create or update tag release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          shopt -s nullglob
          installers=(release-assets/*.exe)
          if [[ ${#installers[@]} -ne 1 ]]; then
            echo "Expected exactly one NSIS installer, found ${#installers[@]}." >&2
            exit 1
          fi

          assets=(release-assets/*)

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --verify-tag \
              --generate-notes \
              --title "SonicForge Studio $GITHUB_REF_NAME"
          fi
