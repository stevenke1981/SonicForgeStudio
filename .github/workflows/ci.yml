name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install stable Rust with required components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Prepare demo output directory
        run: mkdir -p artifacts

      - name: Run CLI demo smoke test
        run: cargo run -p sonicforge-cli -- demo artifacts/demo.wav

      - name: Upload demo WAV
        uses: actions/upload-artifact@v4
        with:
          name: sonicforge-ci-demo
          path: artifacts/demo.wav
          if-no-files-found: error

  desktop:
    name: Desktop GUI checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/desktop/pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Lint frontend
        run: corepack pnpm lint

      - name: Typecheck frontend
        run: corepack pnpm typecheck

      - name: Run frontend unit tests
        run: corepack pnpm test

      - name: Build frontend
        run: corepack pnpm build

      - name: Install Playwright Chromium
        run: corepack pnpm exec playwright install --with-deps chromium

      - name: Run browser acceptance tests
        run: corepack pnpm exec playwright test
